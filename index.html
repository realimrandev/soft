<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glassmorphism Landing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg">
      <span class="blob blob-1" aria-hidden="true"></span>
      <span class="blob blob-2" aria-hidden="true"></span>
      <span class="blob blob-3" aria-hidden="true"></span>

      <main class="shell">
        <section class="glass" aria-label="Landing hero">
          <header class="topbar">
            <a class="logo" href="#">LOGO<span class="chev">&gt;</span></a>

            <nav class="nav" aria-label="Primary">
              <a href="#">Home</a>
              <a href="#">Latest</a>
              <a href="#">Offers</a>
              <a href="#">Services</a>
              <a href="#">Contact</a>
            </nav>

            <div class="auth">
              <a class="btn" href="#">Login</a>
              <a class="btn" href="#">Register</a>
            </div>
          </header>

          <div class="content">
            <div class="copy">
              <h1>
                Learn To Enjoy,<br />
                Every Moment Of Your <br class="br-sm" /> Life
              </h1>
              <p>
                Lorem ipsum dolor sit amet, consectetur adipisicing elit. Laborum facere in
                nam, officiis aspernatur consectetur aliquid sequi possimus et. Sint.
              </p>
            </div>

            <a class="play" href="#" aria-label="Play video">
              <span class="play-line" aria-hidden="true"></span>
              <span class="play-text">Play Video</span>
              <span class="play-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M10 8.7v6.6c0 .6.7.9 1.2.6l5.2-3.3c.5-.3.5-1 0-1.3l-5.2-3.3c-.5-.3-1.2 0-1.2.6Z" fill="currentColor"/>
                </svg>
              </span>
            </a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
